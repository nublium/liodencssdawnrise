<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="170" viewBox="0 0 260 170" preserveAspectRatio="xMidYMid slice">
  <!-- UNSORTED LIONS banner — wandering pride at dawn -->
  <defs>
    <radialGradient id="usSky" cx="50%" cy="40%" r="80%">
      <stop offset="0%"  stop-color="#5c3e10"/>
      <stop offset="40%" stop-color="#1c1208"/>
      <stop offset="100%" stop-color="#0a0605"/>
    </radialGradient>
    <linearGradient id="usGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#f5d272"/>
      <stop offset="50%" stop-color="#c08a2a"/>
      <stop offset="100%" stop-color="#5c3e10"/>
    </linearGradient>
    <radialGradient id="usSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd97a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e89538" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="260" height="170" fill="url(#usSky)"/>
  <rect x="4" y="4" width="252" height="162" fill="none" stroke="url(#usGold)" stroke-width="0.5" opacity="0.55"/>

  <!-- Big rising sun -->
  <circle cx="130" cy="95" r="56" fill="url(#usSun)"/>
  <circle cx="130" cy="95" r="22" fill="#ffd97a" opacity="0.85"/>
  <circle cx="130" cy="95" r="10" fill="#fff5d0" opacity="0.95"/>

  <!-- Sun rays -->
  <g stroke="url(#usGold)" stroke-width="0.6" opacity="0.55">
    <line x1="130" y1="20" x2="130" y2="40"/>
    <line x1="60"  y1="95" x2="80"  y2="95"/>
    <line x1="180" y1="95" x2="200" y2="95"/>
    <line x1="80"  y1="50" x2="92"  y2="62"/>
    <line x1="180" y1="50" x2="168" y2="62"/>
  </g>

  <!-- Horizon land mass -->
  <path d="M 0 135
           Q 50 130, 90 132
           Q 130 128, 170 132
           Q 220 134, 260 135
           L 260 170 L 0 170 Z"
        fill="#0d0907"/>
  <path d="M 0 135 Q 50 130, 90 132 Q 130 128, 170 132 Q 220 134, 260 135"
        fill="none" stroke="url(#usGold)" stroke-width="0.6" opacity="0.65"/>

  <!-- Three small wandering lion silhouettes -->
  <g fill="#0d0907" stroke="url(#usGold)" stroke-width="0.4" opacity="0.95">
    <!-- Lion 1 (left, smaller, walking) -->
    <path d="M 40 134
             L 42 126 L 50 122 L 60 124 L 66 128
             Q 65 130, 64 132 L 64 138
             L 60 138 L 60 136 L 50 136 L 50 138
             L 46 138 L 46 134 Z"/>
    <!-- Lion 2 (center, with mane) -->
    <path d="M 110 130
             Q 105 122, 112 118
             Q 120 113, 130 115
             Q 138 117, 140 124
             L 142 128 L 145 130 L 142 132
             L 142 138 L 138 138 L 138 134
             L 120 134 L 120 138 L 116 138 L 116 132
             Z"/>
    <!-- Lion 3 (right) -->
    <path d="M 195 132
             L 198 125 L 208 122 L 218 124 L 224 130
             L 222 134 L 222 138 L 218 138 L 218 135
             L 208 135 L 208 138 L 204 138 L 204 133 Z"/>
  </g>

  <!-- Acacia silhouettes flanking -->
  <g fill="#0d0907" stroke="url(#usGold)" stroke-width="0.4" opacity="0.85">
    <path d="M 18 135 L 20 115 L 22 135 Z"/>
    <ellipse cx="20" cy="113" rx="10" ry="3"/>
    <path d="M 240 135 L 242 118 L 244 135 Z"/>
    <ellipse cx="242" cy="116" rx="8" ry="2.5"/>
  </g>

  <!-- Title -->
  <text x="130" y="158" font-family="Cinzel, serif" font-size="9"
        fill="rgba(245, 210, 114, 0.85)" text-anchor="middle" letter-spacing="4"
        font-weight="700">— UNSORTED —</text>
</svg>
